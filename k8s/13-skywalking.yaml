apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-oap
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-oap
  template:
    metadata:
      labels:
        app: skywalking-oap
    spec:
      containers:
        - name: skywalking-oap
          image: apache/skywalking-oap-server:9.7.0
          ports:
            - containerPort: 11800
            - containerPort: 12800
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-oap
  namespace: campus-studyroom
spec:
  selector:
    app: skywalking-oap
  ports:
    - name: grpc
      port: 11800
      targetPort: 11800
    - name: rest
      port: 12800
      targetPort: 12800
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-ui
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-ui
  template:
    metadata:
      labels:
        app: skywalking-ui
    spec:
      containers:
        - name: skywalking-ui
          image: apache/skywalking-ui:9.7.0
          env:
            - name: SW_OAP_ADDRESS
              value: "http://skywalking-oap:12800"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-ui
  namespace: campus-studyroom
spec:
  selector:
    app: skywalking-ui
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort
