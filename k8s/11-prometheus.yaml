apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: campus-studyroom
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'campus-services'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets:
              - 'campus-auth:8001'
              - 'campus-user:8002'
              - 'campus-room:8003'
              - 'campus-reservation:8004'
              - 'campus-attendance:8005'
              - 'campus-ai:8006'
              - 'campus-gateway:8000'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: campus-studyroom
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: NodePort
