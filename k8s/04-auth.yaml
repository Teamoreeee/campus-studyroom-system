apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-auth
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campus-auth
  template:
    metadata:
      labels:
        app: campus-auth
    spec:
      containers:
        - name: campus-auth
          image: campus-studyroom/campus-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: campus-config
---
apiVersion: v1
kind: Service
metadata:
  name: campus-auth
  namespace: campus-studyroom
spec:
  selector:
    app: campus-auth
  ports:
    - port: 8001
      targetPort: 8001
