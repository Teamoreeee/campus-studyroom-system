apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-redis
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campus-redis
  template:
    metadata:
      labels:
        app: campus-redis
    spec:
      containers:
        - name: redis
          image: redis:7.0.15
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: campus-redis
  namespace: campus-studyroom
spec:
  selector:
    app: campus-redis
  ports:
    - port: 6379
      targetPort: 6379
