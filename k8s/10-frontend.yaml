apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-frontend
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campus-frontend
  template:
    metadata:
      labels:
        app: campus-frontend
    spec:
      containers:
        - name: campus-frontend
          image: campus-studyroom/campus-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: campus-frontend
  namespace: campus-studyroom
spec:
  selector:
    app: campus-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
  type: NodePort
