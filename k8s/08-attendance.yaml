apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-attendance
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campus-attendance
  template:
    metadata:
      labels:
        app: campus-attendance
    spec:
      containers:
        - name: campus-attendance
          image: campus-studyroom/campus-attendance:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: campus-config
---
apiVersion: v1
kind: Service
metadata:
  name: campus-attendance
  namespace: campus-studyroom
spec:
  selector:
    app: campus-attendance
  ports:
    - port: 8005
      targetPort: 8005
