apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-nacos
  namespace: campus-studyroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campus-nacos
  template:
    metadata:
      labels:
        app: campus-nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.3.0
          env:
            - name: MODE
              value: "standalone"
            # 使用 Nacos 内置 Derby，不依赖外部 MySQL
            - name: SPRING_DATASOURCE_PLATFORM
              value: ""
          ports:
            - containerPort: 8848
            - containerPort: 9848
          readinessProbe:
            httpGet:
              path: /nacos/actuator/health
              port: 8848
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nacos/actuator/health
              port: 8848
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: campus-nacos
  namespace: campus-studyroom
spec:
  selector:
    app: campus-nacos
  ports:
    - name: http
      port: 8848
      targetPort: 8848
    - name: grpc
      port: 9848
      targetPort: 9848
