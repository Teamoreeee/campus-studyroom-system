# Development config
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_studyroom?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  config:
    import: "optional:nacos:"

logging:
  level:
    com.campus.auth.mapper: debug
    root: info

# Gateway direct mode (no Nacos)
gateway:
  direct: true
