server:
  port: 8000

spring:
  application:
    name: campus-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml
        namespace: dev
        group: DEFAULT_GROUP
        import-check:
          enabled: false
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 10000

logging:
  level:
    com.campus.gateway: debug
    org.springframework.cloud.gateway: debug

springdoc:
  api-docs:
    enabled: true
    path: /springdoc/v3/api-docs
  swagger-ui:
    url: /v3/api-docs
    disable-swagger-default-url: true
